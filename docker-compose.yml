services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Container de desenvolvimento (Python + uv). E nele que o VS Code /
  # Codespaces se conecta (ver .devcontainer/devcontainer.json). Roda
  # "sleep infinity" porque, por ora, nao ha uma aplicacao (Streamlit)
  # para manter em primeiro plano -- o trabalho e feito via terminal
  # (ingestao, scripts, etc.).
app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_HOST: qdrant
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
  # postgres_data:   # fase futura (Postgres) -- descomente ao religar

